<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/orb.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title">
                <span class="logo">R</span>
                <h1>Raphael</h1>
            </div>
            <div class="header-controls">
                <button class="header-btn" id="mute-btn" title="Mute microphone (voice disabled)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                        <line x1="1" y1="1" x2="23" y2="23" class="mute-line"/>
                    </svg>
                </button>
                <div class="header-status">
                    <span class="status-indicator" id="status-indicator"></span>
                    <span class="status-text" id="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="orb-section">
                <div class="orb" id="orb">
                    <div class="orb-galaxy">
                        <div class="galaxy-star" style="--delay: 0s; --x: 20%; --y: 30%;"></div>
                        <div class="galaxy-star" style="--delay: 0.5s; --x: 80%; --y: 20%;"></div>
                        <div class="galaxy-star" style="--delay: 1s; --x: 60%; --y: 70%;"></div>
                        <div class="galaxy-star" style="--delay: 1.5s; --x: 30%; --y: 80%;"></div>
                        <div class="galaxy-star" style="--delay: 2s; --x: 75%; --y: 55%;"></div>
                        <div class="galaxy-star" style="--delay: 0.3s; --x: 45%; --y: 15%;"></div>
                        <div class="galaxy-star" style="--delay: 1.2s; --x: 15%; --y: 60%;"></div>
                        <div class="galaxy-star" style="--delay: 0.8s; --x: 85%; --y: 85%;"></div>
                    </div>
                    <div class="orb-outer-glow"></div>
                    <div class="orb-ring orb-ring-3"></div>
                    <div class="orb-ring orb-ring-2"></div>
                    <div class="orb-ring orb-ring-1"></div>
                    <div class="orb-core">
                        <div class="orb-core-inner"></div>
                    </div>
                    <div class="orb-particles" id="orb-particles"></div>
                </div>
                <div class="voice-status" id="voice-status"></div>
            </div>

            <div class="chat-container" id="chat-container">
                <div class="messages" id="messages">
                    <div class="message assistant">
                        <div class="message-content">
                            <p>Hello! I'm Raphael, your personal AI assistant. How can I help you today?</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-container">
                <button class="icon-btn clear-btn" id="clear-btn" title="Clear conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
                    </svg>
                </button>
                <textarea 
                    id="message-input" 
                    placeholder="Type your message... (Hindi, English, or Hinglish)"
                    rows="1"
                ></textarea>
                <button class="icon-btn voice-btn" id="voice-btn" title="Voice input (Left Alt+Enter)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <button class="icon-btn stop-btn hidden" id="stop-btn" title="Stop generation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
                <button class="icon-btn send-btn" id="send-btn" disabled title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Enter to send | Shift+Enter for new line | Left Alt+Enter for voice</p>
        </footer>
    </div>

    <script src="/static/js/orb.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
