<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raphael - Chat</title>
    <link rel="stylesheet" href="/static/css/chat.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo-link">
                    <span class="logo">R</span>
                </a>
                <button class="new-chat-btn" id="new-chat-btn" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <a href="/assistant" class="mode-switch" title="Switch to Assistant Mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                    </svg>
                    <span>Assistant Mode</span>
                </a>
            </div>
        </aside>

        <main class="main">
            <header class="header">
                <button class="toggle-sidebar-btn" id="toggle-sidebar-btn" title="Toggle Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="chat-title" id="chat-title">New Chat</h1>
                <div class="header-controls">
                    <div class="status">
                        <span class="status-indicator" id="status-indicator"></span>
                        <span class="status-text" id="status-text">Connecting...</span>
                    </div>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="messages" id="messages">
                    <div class="welcome-message">
                        <div class="welcome-icon">R</div>
                        <h2>How can I help you today?</h2>
                        <p>Ask me anything - coding help, explanations, drafting text, or just have a conversation.</p>
                    </div>
                </div>
            </div>

            <footer class="input-area">
                <div class="input-container">
                    <button class="icon-btn mic-btn" id="mic-btn" title="Voice input (Alt+Enter)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <textarea 
                        id="message-input" 
                        placeholder="Type your message..."
                        rows="1"
                    ></textarea>
                    <button class="icon-btn stop-btn hidden" id="stop-btn" title="Stop (Esc)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                    <button class="icon-btn send-btn" id="send-btn" disabled title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Enter to send | Shift+Enter for new line | Alt+Enter for voice</p>
            </footer>
        </main>
    </div>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
